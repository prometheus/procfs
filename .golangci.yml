formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/prometheus/procfs
linters:
  enable:
    - forbidigo
    - godot
    - misspell
    - revive
    - testifylint
  exclusions:
    generated: strict
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    warn-unused: true
  settings:
    forbidigo:
      forbid:
        - pattern: ^fmt\.Print.*$
          msg: Do not commit print statements.
    godot:
      capital: true
      exclude:
        # Ignore "See: URL".
        - 'See:'
    misspell:
      locale: US
version: "2"
